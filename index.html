<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Classroom Calendar</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 24px; background-color: #ffffff; }
    .container { max-width: 800px; margin: 0 auto; }
    .navbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .nav-buttons button { padding: 6px 12px; cursor: pointer; }
    .nav-title { margin: 0 16px; font-weight: bold; fontSize: 1.2rem; }
    .view-buttons button { padding: 6px 12px; cursor: pointer; background-color: #fff; border: 1px solid #ccc; margin-left: 4px; }
    .view-buttons button.active { background-color: #e2e8f0; }
    .filter-section { margin-bottom: 20px; }
    .filter-section select { padding: 4px 8px; }
    .grid-header { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-weight: bold; margin-bottom: 8px; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
    .day-cell { padding: 12px; border: 1px solid #e2e8f0; border-radius: 6px; cursor: pointer; position: relative; min-height: 70px; background-color: #fff; transition: all 0.2s ease; }
    .day-cell.other-month { background-color: #f8fafc; color: #94a3b8; }
    .day-cell.selected { background-color: #3b82f6 !important; color: #fff !important; font-weight: bold; }
    .dot { position: absolute; bottom: 6px; right: 6px; width: 8px; height: 8px; background-color: #22c55e; border-radius: 50%; }
    .day-cell.selected .dot { background-color: #fff; }
    .dashboard { margin-top: 24px; border: 1px solid #cbd5e1; padding: 16px; border-radius: 8px; background-color: #f8fafc; }
    .dashboard h3 { margin: 0 0 8px 0; border-bottom: 1px solid #cbd5e1; padding-bottom: 8px; }
    .date-string { font-weight: 600; color: #475569; margin: 4px 0; }
    .log-card { margin-top: 12px; padding: 12px; background-color: #fff; border-radius: 6px; border: 1px solid #e2e8f0; }
    .log-card h4 { margin: 0 0 4px 0; color: #1e3a8a; }
    .log-card p { margin: 0 0 8px 0; color: #334155; }
    .class-badge { font-size: 0.85rem; padding: 2px 6px; background-color: #f1f5f9; border-radius: 4px; font-weight: bold; color: #000; }
    .action-btn { margin-top: 16px; padding: 8px 16px; background-color: #2563eb; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
    .no-lessons { color: #64748b; font-style: italic; }
  </style>
</head>
<body>

  <div class="container">
    <!-- Top Navbar -->
    <div class="navbar">
      <div class="nav-buttons">
        <button onclick="navigateMonth(-1)">◀</button>
        <span class="nav-title" id="monthYearLabel">June 2026</span>
        <button onclick="navigateMonth(1)">▶</button>
      </div>
      <div class="view-buttons">
        <button id="monthViewBtn" class="active" onclick="setView('month')">Month</button>
        <button id="weekViewBtn" onclick="setView('week')">Week</button>
        <button onclick="window.print()">Print</button>
      </div>
    </div>

    <!-- Filter Options -->
    <div class="filter-section">
      <label style="margin-right: 8px; font-weight: 500;">Filter Dashboard: </label>
      <select id="classFilter" onchange="handleFilterChange(this.value)">
        <option value="all">All Classes</option>
        <option value="P2">P2 Only</option>
        <option value="P3B">P3B Only</option>
        <option value="P4" Only</option>
      </select>
    </div>

    <!-- Grid Header Labels -->
    <div class="grid-header">
      <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
    </div>

    <!-- Main Grid -->
    <div class="calendar-grid" id="calendarGrid"></div>

    <!-- Dashboard Panel -->
    <div class="dashboard">
      <h3>Selected Date Dashboard</h3>
      <p class="date-string" id="selectedDateText">No date selected</p>
      <div id="logDisplayArea"></div>
      <button class="action-btn" id="actionBtn" style="display: none;" onclick="handleAddEditLog()">Add Lesson Log</button>
    </div>
  </div>

  <script>
    // State
    let currentDate = new Date(2026, 5, 17); // June 2026
    let selectedDateKey = "";
    let currentView = "month";
    let currentFilter = "all";

    const logs = {
      "2026-06-17": { title: "Getting Started Fresh", description: "Rebuilding our calendar app from scratch!", class: "A" }
    };

    function formatDateToKey(dateObj) {
      const y = dateObj.getFullYear();
      const m = String(dateObj.getMonth() + 1).padStart(2, "0");
      const d = String(dateObj.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function navigateMonth(direction) {
      currentDate.setMonth(currentDate.getMonth() + direction);
      render();
    }

    function setView(viewType) {
      currentView = viewType;
      document.getElementById('monthViewBtn').classList.toggle('active', viewType === 'month');
      document.getElementById('weekViewBtn').classList.toggle('active', viewType === 'week');
      render();
    }

    function handleFilterChange(val) {
      currentFilter = val;
      render();
    }

    function selectDate(key) {
      selectedDateKey = key;
      render();
    }

    function handleAddEditLog() {
      if (!selectedDateKey) return;
      const title = prompt("Enter Lesson/Event Title:");
      if (!title) return;
      const description = prompt("Enter Description:");
      const cls = prompt("Enter Class Category (A or B):", "A").toUpperCase();

      logs[selectedDateKey] = { title, description, class: cls };
      render();
    }

    function render() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      
      // Update Title Label
      const monthLabel = currentDate.toLocaleString("default", { month: "long" });
      document.getElementById('monthYearLabel').innerText = `${monthLabel} ${year}`;

      const gridContainer = document.getElementById('calendarGrid');
      gridContainer.innerHTML = "";

      let cells = [];

      if (currentView === "month") {
        const firstDayOffset = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        // Previous month offset padding
        for (let i = firstDayOffset - 1; i >= 0; i--) {
          cells.push({ date: new Date(year, month, -i), currentMonth: false });
        }
        // Current month days
        for (let i = 1; i <= daysInMonth; i++) {
          cells.push({ date: new Date(year, month, i), currentMonth: true });
        }
      } else {
        // Week View logic
        const currentDayOfWeek = currentDate.getDay();
        const startOfWeek = new Date(currentDate);
        startOfWeek.setDate(currentDate.getDate() - currentDayOfWeek);
        for (let i = 0; i < 7; i++) {
          const day = new Date(startOfWeek);
          day.setDate(startOfWeek.getDate() + i);
          cells.push({ date: day, currentMonth: true });
        }
      }

      // Render individual cells
      cells.forEach(cell => {
        const key = formatDateToKey(cell.date);
        const cellEl = document.createElement('div');
        cellEl.className = `day-cell ${!cell.currentMonth ? 'other-month' : ''} ${selectedDateKey === key ? 'selected' : ''}`;
        cellEl.onclick = () => selectDate(key);
        cellEl.innerHTML = `<span>${cell.date.getDate()}</span>`;

        const log = logs[key];
        if (log && (currentFilter === 'all' || log.class === currentFilter)) {
          const dot = document.createElement('span');
          dot.className = 'dot';
          cellEl.appendChild(dot);
        }

        gridContainer.appendChild(cellEl);
      });

      // Render Dashboard Panel
      const dateTextEl = document.getElementById('selectedDateText');
      const displayArea = document.getElementById('logDisplayArea');
      const actionBtn = document.getElementById('actionBtn');

      if (!selectedDateKey) {
        dateTextEl.innerText = "No date selected";
        displayArea.innerHTML = "";
        actionBtn.style.display = "none";
      } else {
        const [y, m, d] = selectedDateKey.split("-");
        dateTextEl.innerText = new Date(y, m - 1, d).toDateString();
        actionBtn.style.display = "block";

        const activeLog = logs[selectedDateKey];
        if (activeLog) {
          actionBtn.innerText = "Edit Lesson Log";
          displayArea.innerHTML = `
            <div class="log-card">
              <h4>${activeLog.title}</h4>
              <p>${activeLog.description}</p>
              <span class="class-badge">Class: ${activeLog.class}</span>
            </div>
          `;
        } else {
          actionBtn.innerText = "Add Lesson Log";
          displayArea.innerHTML = `<p class="no-lessons">No lessons logged for this date.</p>`;
        }
      }
    }

    // Run on startup
    render();
  </script>
</body>
</html>
